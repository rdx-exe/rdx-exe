name: Update Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Updated to v4
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Updated to v4 (Node 24 ready)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG
        run: node scripts/generate-dashboard.js

      - name: Commit changes
        run: |
          git config --global user.name "rdx-exe"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update dashboard" || echo "no changes"
          git push
