name: Update Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # ✅ REQUIRED for pushing changes
    permissions:
      contents: write

    steps:
      # ✅ Updated version
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Updated + future safe
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      # ✅ Run your script
      - name: Generate SVG
        run: node scripts/generate-dashboard.js

      # ✅ Commit ONLY the SVG
      - name: Commit changes
        run: |
          git config user.name "rdx-exe"
          git config user.email "actions@github.com"
          git add assets/dashboard.svg
          git commit -m "update dashboard" || echo "no changes"
          git push
