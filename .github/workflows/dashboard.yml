name: Update Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 REQUIRED to push changes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node (latest LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Run generator
        run: node scripts/generate-dashboard.js

      - name: Commit & Push
        run: |
          git config user.name "rdx-exe"
          git config user.email "actions@github.com"
          git add assets/dashboard.svg
          git commit -m "update dashboard" || echo "no changes"
          git push
